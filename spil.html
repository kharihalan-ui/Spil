<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Spil Portal</title>
    <style>
        /* Grundlæggende styling */
        body {
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Overskrift / Logo område */
        header {
            margin-bottom: 30px;
            text-align: center;
            animation: fadeInDown 0.8s ease;
        }

        /* GRID SYSTEM: Her kan du nemt tilføje 100 spil */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
            animation: fadeInUp 1s ease;
        }

        /* Det enkelte spil-kort */
        .game-card {
            text-decoration: none;
            color: white;
            background: #151515;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #333;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        /* Hover animation: Gør kortet større og lysere */
        .game-card:hover {
            transform: translateY(-10px) scale(1.03);
            border-color: #2196F3;
            box-shadow: 0 10px 30px rgba(33, 150, 243, 0.3);
        }

        .game-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-bottom: 1px solid #333;
        }

        .game-info {
            padding: 15px;
            text-align: center;
        }

        .game-title {
            display: block;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
        }

        /* Annonce plads (Ads) */
        .ad-container {
            width: 100%;
            max-width: 970px;
            margin: 20px 0;
            background: #0a0a0a;
            border-radius: 15px;
            text-align: center;
            padding: 10px;
            border: 1px dashed #444;
        }

        /* Animation Keyframes */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsiv: Gør det pænt på mobilen */
        @media (max-width: 600px) {
            .game-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
        }
    </style>
</head>
